version: 2

sources:
  - name: jaffle_shop
    database: postgres
    schema: jaffle_shop
    tables:
      - name: orders
        description: Raw orders data

models:
  - name: gift_card_orders
    description: "Orders that include gift card payments"
    columns:
      - name: order_id
        description: "The primary key for orders"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "The foreign key to customers"
        tests:
          - not_null
      - name: order_date
        description: "Date when the order was placed"
      - name: status
        description: "Current status of the order"
      - name: gift_card_amount
        description: "Amount paid using gift card"
        tests:
          - not_null
      - name: amount
        description: "Total order amount"
        tests:
          - not_null